name: Daily Archive

on:
  schedule:
    # 06:05 UTC = ~02:05 ET / 11:05 PT — well after the last match of the day.
    - cron: '5 6 * * *'
  workflow_dispatch: {}

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate recap text
        run: node scripts/generate-recap.js

      - name: Generate archive snapshot
        run: node scripts/generate-archive.js

      - name: Commit
        run: |
          git config user.name "archive-bot"
          git config user.email "archive-bot@thegroup.local"
          git add archive/ recap.json
          if git diff --cached --quiet; then
            echo "Nothing to archive."
            exit 0
          fi
          git commit -m "archive: $(date -u +%Y-%m-%d)"
          # main is committed to frequently, so a plain push can be rejected as
          # non-fast-forward. Integrate concurrent commits and retry; on the rare
          # recap.json/archive overlap the freshest generated copy (ours) wins.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected — rebasing on origin/main (attempt $attempt of 5)."
            git pull --rebase -X theirs origin main || git rebase --abort || true
          done
          echo "Push still failing after 5 attempts." >&2
          exit 1
