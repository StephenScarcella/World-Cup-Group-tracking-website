name: Fetch WC Scores

on:
  schedule:
    # 1:00 PM EDT (17:00 UTC) — after early afternoon matches
    - cron: '0 17 * * *'
    # 4:00 PM EDT (20:00 UTC) — after afternoon matches
    - cron: '0 20 * * *'
    # 11:50 PM EDT (03:50 UTC next day) — final scores of the day
    - cron: '50 3 * * *'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and normalize results
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/fetch-scores.js

      - name: Commit if changed
        run: |
          git config user.name "score-bot"
          git config user.email "score-bot@thegroup.local"
          git add results.json
          if git diff --cached --quiet; then
            echo "No score changes."
          else
            git commit -m "scores: auto-update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
