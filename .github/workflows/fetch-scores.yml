name: Fetch WC Scores

on:
  schedule:
    # Every 10 minutes. The site reads results.json straight from GitHub raw
    # and Netlify skips deploys for results.json-only commits, so frequent
    # updates cost nothing on Netlify. Runs that find no score change make no
    # commit. (GitHub runs scheduled workflows on a best-effort basis and may
    # delay them under load.)
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch and normalize results
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/fetch-scores.js

      - name: Commit if changed
        run: |
          git config user.name "score-bot"
          git config user.email "score-bot@thegroup.local"
          git add results.json
          if git diff --cached --quiet; then
            echo "No score changes."
            exit 0
          fi
          git commit -m "scores: auto-update $(date -u +%Y-%m-%dT%H:%MZ)"
          # main is committed to frequently (scores ~every 10 min, nightly
          # archive, occasional source pushes), so a plain push can be rejected
          # as non-fast-forward. Integrate concurrent commits and retry; on the
          # rare results.json overlap the freshest fetch (ours) wins.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected — rebasing on origin/main (attempt $attempt of 5)."
            git pull --rebase -X theirs origin main || git rebase --abort || true
          done
          echo "Push still failing after 5 attempts." >&2
          exit 1
